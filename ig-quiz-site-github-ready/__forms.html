<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>表單登記</title>
  </head>
  <body>
    <form name="ig-account-check" method="POST" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
      <input type="hidden" name="form-name" value="ig-account-check" />
      <input name="bot-field" />
      <input name="ig_url" type="text" />
      <input name="instagram" type="text" />
      <input name="display_name" type="text" />
      <input name="content_score" type="hidden" />
      <input name="positioning_score" type="hidden" />
      <input name="conversion_score" type="hidden" />
      <input name="diagnosis" type="hidden" />
      <input name="diagnosis_summary" type="hidden" />
      <input name="check_basis" type="hidden" />
      <input name="industry_result" type="hidden" />
      <input name="follower_tier" type="hidden" />
      <input name="ocr_text" type="hidden" />
      <input name="ocr_metrics" type="hidden" />
      <input name="profile_screenshot" type="file" />
      <input name="reels_screenshot" type="file" />
      <input name="post_screenshot" type="file" />
    </form>
  </body>
</html>
