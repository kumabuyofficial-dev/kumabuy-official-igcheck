<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="brand-growth-brief" method="POST" enctype="multipart/form-data" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="brand-growth-brief" />
      <input name="bot-field" />
      <input name="name" />
      <input name="brand_name" />
      <input name="contact" />
      <input name="main_link" />
      <input name="identity" />
      <textarea name="offer"></textarea>
      <input name="brand_age" />
      <input name="positioning_status" />
      <input name="platforms" />
      <input name="content_rhythm" />
      <input name="crm_status" />
      <input name="ig_followers" />
      <input name="line_list_size" />
      <input name="experience" />
      <input name="pain_points" />
      <input name="goals" />
      <textarea name="six_month_goal"></textarea>
      <input name="needed_support" />
      <input name="budget_range" />
      <input name="start_time" />
      <input name="cooperation_period" />
      <textarea name="reference_links"></textarea>
      <input name="brand_file" type="file" />
      <textarea name="notes"></textarea>
    </form>
  </body>
</html>
